<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Насколько ты меня любишь? 💗</title>
<style>
body{
margin:0;
font-family: 'Segoe UI', sans-serif;
background: linear-gradient(135deg,#ff9acb,#ffc0e1,#ffd6ee);
height:100vh;
display:flex;
align-items:center;
justify-content:center;
overflow:hidden;
}

.container{
background:rgba(255,255,255,0.85);
padding:40px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.15);
width:90%;
max-width:500px;
text-align:center;
animation:fadeIn 1s ease;
}

h1{
color:#ff3f8e;
margin-bottom:20px;
}

button{
background:#ff4fa3;
border:none;
padding:12px 20px;
margin:10px;
border-radius:12px;
color:white;
font-size:16px;
cursor:pointer;
transition:all .25s ease;
box-shadow:0 5px 15px rgba(255,79,163,.4);
}

button:hover{
transform:translateY(-3px) scale(1.05);
box-shadow:0 8px 20px rgba(255,79,163,.6);
}

.answers{
display:flex;
flex-direction:column;
}

.result{
font-size:22px;
color:#ff2d86;
margin-top:20px;
}

.hearts{
position:fixed;
width:100%;
height:100%;
left:0;
top:0;
pointer-events:none;
}

.heart{
position:absolute;
color:#ff7db8;
animation:float 6s linear infinite;
}

@keyframes float{
0%{transform:translateY(100vh) scale(0.5);opacity:0}
50%{opacity:1}
100%{transform:translateY(-10vh) scale(1.2);opacity:0}
}

@keyframes fadeIn{
from{opacity:0; transform:translateY(20px)}
to{opacity:1; transform:translateY(0)}
}
</style>
</head>
<body>

<div class="hearts" id="hearts"></div>

<div class="container">
<h1>Насколько ты меня любишь? 💖</h1>
<div id="quiz"></div>
<div class="result" id="result"></div>
</div>

<script>
const questions=[
{
q:"Ты часто думаешь обо мне?",
a:["Постоянно ❤️","Иногда 🙂","Редко 😅"],
s:[3,2,1]
},
{
q:"Хочешь ли ты проводить со мной больше времени?",
a:["Да очень! 💕","Иногда","Не особо"],
s:[3,2,1]
},
{
q:"Скучаешь ли ты по мне?",
a:["Очень сильно 😍","Немного","Почти нет"],
s:[3,2,1]
},
{
q:"Насколько я для тебя важен?",
a:["Очень важен 💖","Важен","Ну норм"],
s:[3,2,1]
},
{
q:"Хочешь ли ты обнимашек со мной прямо сейчас?",
a:["ДААА 🤗","Может быть","Не знаю"],
s:[3,2,1]
}
];

let current=0;
let score=0;

function showQuestion(){
const q=questions[current];
let html=`<h2>${q.q}</h2><div class="answers">`;

q.a.forEach((ans,i)=>{
html+=`<button onclick="answer(${i})">${ans}</button>`;
});

html+="</div>";
document.getElementById("quiz").innerHTML=html;
}

function answer(i){
score+=questions[current].s[i];
current++;

if(current<questions.length){
showQuestion();
}else{
showResult();
}
}

function showResult(){
let max=questions.length*3;
let percent=Math.round(score/max*100);

document.getElementById("quiz").innerHTML="";

document.getElementById("result").innerHTML=
"💗 Уровень любви: <b>"+percent+"%</b> 💗";
}

showQuestion();

// hearts
function createHeart(){
const heart=document.createElement("div");
heart.className="heart";
heart.innerHTML="❤";
heart.style.left=Math.random()*100+"vw";
heart.style.fontSize=(10+Math.random()*30)+"px";
heart.style.animationDuration=(4+Math.random()*4)+"s";

document.getElementById("hearts").appendChild(heart);

setTimeout(()=>heart.remove(),7000);
}

setInterval(createHeart,400);
</script>

</body>
</html>
